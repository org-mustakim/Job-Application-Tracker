<!DOCTYPE html>
<html lang="en" data-theme="emerald">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application TrackerDocument</title>

    <!-- Tailwind + Daisy UI -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Emerald Theme -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

    <!-- Google Font Geist -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

</head>

<body class="container mx-auto py-16 px-8 space-y-16 bg-base-200/50">
    <header class="space-y-5">
        <h2 class="text-[32px] font-bold text-[#002c5c]">Job Application Tracker</h2>
        <div class="grid grid-cols-3 gap-4">
            <div class="bg-white rounded-lg p-5 shadow-sm">
                <p class="text-[#323b49] text-[14px]">Total</p>
                <h2 class="font-bold text-2xl text[#002c5c]">8</h2>
            </div>
            <div class="bg-white rounded-lg p-5 shadow-sm">
                <p class="text-[#323b49] text-[14px]">Interview</p>
                <h2 class="font-bold text-2xl text-[#10b981]">0</h2>
            </div>
            <div class="bg-white rounded-lg p-5 shadow-sm">
                <p class="text-[#323b49] text-[14px]">Rejected</p>
                <h2 class="font-bold text-2xl text-[#ef4444]">0</h2>
            </div>
        </div>
    </header>

    <main>
        <section id="All-job-section">
            <h3 class="text-xl font-semibold text-[#002c5c] mb-6">Available Jobs</h3>
            <div class="three-buttons space-x-2">
                <button class="btn btn-soft btn-secondary rounded h-8 w-20 py-2">All</button>
                <button class="btn btn-soft btn-primary rounded h-8 w-20 py-2">Interview</button>
                <button class="btn btn-soft btn-error rounded h-8 w-20 py-2">Rejected</button>
            </div>
            <div>
                <div id="mobile-corp" class="p-6 my-4 bg-white rounded-lg shadow-sm relative">
                    <h3 class="text-[#002c5c] font-semibold text-[18px] mb-1 ">Mobile First Corp</h3>
                    <button class="btn btn-outline absolute rounded-full right-[24px] top-[34px]">
                        <i class="fa-solid fa-trash-can"></i>

                    </button>
                    <p class="text-[#64748b] text-base mb-5">React Native Developer</p>
                    <p class="text-[#64748b] tenxt-[14px] mb-5">
                        Remote • Full-time • $130,000 - $175,000
                    </p>
                    <button class="badge-ghost rounded-[4px] px-3 py-2 text-[#002c5c] font-medium mb-2">NOT
                        APPLIED</button>
                    <p class="text-[#323b49] tenxt-[14px] mb-5">
                        Build cross-platform mobile applications using React Native. Work on products used by millions
                        of
                        users worldwide.
                    </p>
                    <div class="flex gap-2">
                        <button class="btn rounded-[4px] btn-primary btn-outline">INTERVIEW</button>
                        <button class="btn rounded-[4px] btn-error btn-outline">REJECTED</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

</body>

</html>
